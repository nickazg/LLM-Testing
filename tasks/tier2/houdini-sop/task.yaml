id: tier2-houdini-sop
name: "SOP Network + HDA Parms"
tier: 2
prompt: "Create a Python file called build_sop_network.py that builds a Houdini SOP network using the hou module. The script should:\n\n1. Get a reference to /obj and create a Geometry container node: geo = hou.node('/obj').createNode('geo', 'my_geo')\n2. Inside the geo node, create a chain of SOP nodes:\n   - grid1 = geo.createNode('grid', 'base_grid')\n   - mountain1 = geo.createNode('mountain', 'terrain')\n   - color1 = geo.createNode('color', 'colorize')\n   - null1 = geo.createNode('null', 'OUT')\n3. Connect them in sequence: mountain1.setInput(0, grid1) → color1.setInput(0, mountain1) → null1.setInput(0, color1)\n4. Set parameters:\n   - grid1.parm('rows').set(50)\n   - grid1.parm('cols').set(50)\n   - grid1.parm('sizex').set(10.0)\n   - grid1.parm('sizey').set(10.0)\n   - mountain1.parm('height').set(2.5)\n   - mountain1.parm('freq').set(3.0)\n   - color1.parm('colorr').set(0.2)\n   - color1.parm('colorg').set(0.8)\n   - color1.parm('colorb').set(0.3)\n5. Set the display and render flags on the null node: null1.setDisplayFlag(True) and null1.setRenderFlag(True)\n6. Layout the nodes: geo.layoutChildren()\n\nThe hou module is provided in the template — import it with 'import hou'"
timeout: 180
skill: null
tags: [python, houdini, sidefx, sop, procedural]
scoring:
  automated:
    - correctness
    - completion
    - efficiency
  flagged:
    - quality
    - instruction_following
