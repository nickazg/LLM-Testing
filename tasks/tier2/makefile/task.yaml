id: tier2-makefile
name: "Multi-target Makefile"
tier: 2
prompt: "Create a Makefile for this C project. The project has source files in src/ and headers in include/. Requirements:\n\n1. Variables: CC=gcc, CFLAGS=-Wall -Wextra -I include, SRC=$(wildcard src/*.c), OBJ=$(SRC:.c=.o), TARGET=myapp\n\n2. Targets:\n   - 'all' (default): build the TARGET executable from object files\n   - Individual .o rules: compile .c to .o with proper dependencies\n   - 'clean': remove all .o files and the TARGET executable\n   - 'test': run the built executable and check exit code\n   - 'install': copy TARGET to /usr/local/bin (use install command)\n\n3. Use automatic variables ($@, $<, $^) where appropriate\n4. Include proper .PHONY declarations"
timeout: 180
skill: null
tags: [make, c, build-systems]
scoring:
  automated:
    - correctness
    - completion
    - efficiency
  flagged:
    - quality
    - instruction_following
