id: tier3-usd-shader-graph
name: "Multi-Material Shader Network"
tier: 3
prompt: "Create a Python script called shader_graph.py that uses the pxr library to build a multi-material shader network. The script must create a file called materials.usda containing:\n\n1. Default prim /Materials\n2. /Materials/WoodMat — a UsdShade.Material containing:\n   - /Materials/WoodMat/Surface — a UsdPreviewSurface shader with diffuseColor input connected to a texture\n   - /Materials/WoodMat/WoodTex — a UsdUVTexture shader with file input set to \"wood_diffuse.png\" and outputs:rgb connected to Surface's diffuseColor\n   - /Materials/WoodMat/UVReader — a UsdPrimvarReader_float2 with varname \"st\", outputs:result connected to WoodTex's st input\n   - Surface roughness=0.7, metallic=0.0\n\n3. /Materials/MetalMat — a UsdShade.Material containing:\n   - /Materials/MetalMat/Surface — a UsdPreviewSurface shader with diffuseColor (0.8, 0.8, 0.85), roughness=0.2, metallic=1.0\n\n4. /Geometry/Table — a UsdGeom.Mesh (simple quad/cube)\n   - Create a UsdGeom.Subset \"top_face\" on the mesh and bind WoodMat to it\n   - Bind MetalMat to the overall mesh (the subset binding overrides for those faces)\n\nUse: from pxr import Usd, UsdGeom, UsdShade, Sdf, Gf"
timeout: 300
