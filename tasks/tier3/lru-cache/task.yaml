id: tier3-lru-cache
name: "LRU Cache (O(1), thread-safe)"
tier: 3
prompt: "Create a Python file called lru_cache.py implementing an LRUCache class with the following requirements:\n\n1. Constructor: LRUCache(capacity: int) — maximum number of items\n2. get(key) → value or -1 if not found. Accessing moves item to most-recently-used\n3. put(key, value) → None. If at capacity, evict the least-recently-used item first\n4. Both get() and put() must be O(1) time complexity\n5. Do NOT use collections.OrderedDict — implement with a dict + doubly-linked list\n6. Must be thread-safe using threading.Lock\n7. Include a size() method returning current number of items"
timeout: 300
skill: null
tags: [python, data-structures, threading, algorithms]
scoring:
  automated:
    - correctness
    - completion
    - efficiency
  flagged:
    - quality
    - instruction_following
