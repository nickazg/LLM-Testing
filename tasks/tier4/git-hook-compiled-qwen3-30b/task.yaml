id: tier4-git-hook-compiled-qwen3-30b
name: Git Pre-commit Hook (compiled-qwen3-30b)
tier: 4
prompt: 'Create a file called pre-commit (no extension) that works as a git pre-commit
  hook. The hook should check all staged files and reject the commit if any of these
  conditions are found:


  1. Any staged file larger than 5MB (5242880 bytes)

  2. Any staged Python file containing print() calls used for debugging (lines with
  just ''print('' that aren''t in comments or strings — simple heuristic is fine)

  3. Any staged file with trailing whitespace on any line

  4. Any staged Python file that fails py_compile syntax check


  The hook should:

  - Print a clear error message for each violation found, prefixed with ''ERROR:''

  - Exit 0 if all checks pass (allow commit)

  - Exit 1 if any check fails (reject commit)

  - Only check files that are staged (git diff --cached --name-only)

  - Be written in bash and be POSIX-compatible'
timeout: 300
