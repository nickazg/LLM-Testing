id: tier4-expression-parser-compiled-devstral
name: Expression Parser + AST (compiled-devstral)
tier: 4
prompt: 'Create a Python file called expr_parser.py implementing a mathematical expression
  parser with these requirements:


  1. Function parse(expression: str) → ASTNode that parses a string into an AST

  2. Function evaluate(node: ASTNode) → float that evaluates an AST to a numeric result

  3. ASTNode class with attributes: type (''number'', ''binop'', ''unary''), value
  (for numbers), op (for operators), left/right (for binop), operand (for unary)

  4. Supported operators: +, -, *, / with standard precedence (* and / before + and
  -)

  5. Support unary minus (e.g., -5, -(3+2))

  6. Support parenthesized expressions

  7. Raise ValueError for invalid expressions (unmatched parens, empty input, invalid
  tokens)

  8. Division by zero should raise ZeroDivisionError'
timeout: 300
skill: recursive-descent-parser:compiled-devstral
