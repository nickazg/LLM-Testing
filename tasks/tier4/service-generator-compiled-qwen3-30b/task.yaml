id: tier4-service-generator-compiled-qwen3-30b
name: Systemd Unit Generator (compiled-qwen3-30b)
tier: 4
prompt: "Create a Python file called generate_service.py that generates systemd service\
  \ unit files from command-line arguments. Usage:\n\n  python generate_service.py\
  \ --name myapp --exec /usr/bin/myapp --user www-data --description 'My Application'\
  \ --after network.target --restart on-failure --output myapp.service\n\nRequired\
  \ args: --name, --exec\nOptional args with defaults:\n  --user (default: root)\n\
  \  --description (default: '{name} service')\n  --after (default: network.target,\
  \ can specify multiple)\n  --restart (default: on-failure, choices: no, on-success,\
  \ on-failure, on-abnormal, on-watchdog, on-abort, always)\n  --restart-sec (default:\
  \ 5)\n  --output (default: {name}.service)\n  --wanted-by (default: multi-user.target)\n\
  \  --env (repeatable, KEY=VALUE pairs to add as Environment= lines)\n  --working-dir\
  \ (optional WorkingDirectory=)\n\nThe generated .service file must be valid systemd\
  \ unit format with [Unit], [Service], and [Install] sections."
