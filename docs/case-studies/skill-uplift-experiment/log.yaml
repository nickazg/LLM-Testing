- id: "028"
  date: "2026-04-06"
  category: result
  title: "Compiled variant benchmarks — 0/4 pass, qwen3-30b with its own compiled skills"
  body: >
    Ran qwen3-30b with its own DSPy-compiled skill variants on both CLIs.
    All 4 runs failed (0.0). usd-compiled-qwen3 CC=0.0/Kilo=0.0,
    houdini-compiled-qwen3 CC=0.0/Kilo=0.0. The model-specific compiled
    skills performed worse than the cross-model glm45-compiled variants.
  evidence:
