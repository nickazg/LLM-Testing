- id: "048"
  date: "2026-04-07"
  category: hypothesis
  title: "Revised theory: CLI environment determines DIRECTION of skill effect"
  body: >
    Phase 2 data supports a revised theory. The capability threshold still
    matters (below/at/above), but the CLI environment determines whether
    the effect is positive or negative. CC's environment (hooks, context
    injection) appears to amplify skill content constructively — models
    integrate it better. Kilo's environment (LSP feedback, provider routing)
    appears to amplify it destructively — models fight against conflicting
    signals. The skill content is the same; the CLI determines the sign.
  evidence:
    - "results/"
  tags: [theory, cli-confound, capability-threshold, key-finding]
  session: "2026-04-07-phase2-analysis"
  retrospective: false
