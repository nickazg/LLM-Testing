# Case Study: Skill Uplift in Budget LLMs
# Started: 2026-04-03
# Description: Measuring whether structured knowledge (skills) can close the gap between budget and frontier LLM coding performance
entries:

# ══════════════════════════════════════════════════════════════
# SESSION: 2026-04-03 — Framework Design
# ══════════════════════════════════════════════════════════════

- id: "001"
  date: "2026-04-03"
  category: method
  title: "Framework design — 4-tier task system with paired skill uplift measurement"
  body: >
    Designed benchmarking framework with 4 task tiers. Tier 1-2 are baselines (no skills).
    Tier 3 tasks require domain knowledge. Tier 4 tasks are IDENTICAL to tier 3 but with
    a skill injected. The delta between tier 3 and tier 4 scores isolates skill uplift.
    This paired design controls for task difficulty and model capability.
  evidence:
    - ".claude/HISTORY.md"
  tags: [design, methodology]
  session: "2026-04-03-design"
  retrospective: true

- id: "002"
  date: "2026-04-03"
  category: method
  title: "Skill injection via .claude/skills/ — the only path all CLIs share"
  body: >
    Researched native skill mechanisms for Claude Code, Open Code, and Kilo CLI.
    All three discover skills placed in .claude/skills/{name}/SKILL.md. This is
    the injection point — skills are copied into the workspace before the CLI runs.
    Claude Code also reads CLAUDE.md, Open Code and Kilo read AGENTS.md — adapters
    write the correct context file per CLI.
  evidence:
    - "src/llm_bench/workspace.py"
    - "src/llm_bench/adapters/"
  tags: [design, skill-injection, cli-adapters]
  session: "2026-04-03-design"
  retrospective: true

- id: "003"
  date: "2026-04-03"
  category: context
  title: "Core research question defined"
  body: >
    Can structured knowledge (domain-specific skills) close the performance gap between
    budget models (Qwen3 Coder 30B, Gemma 4 31B, GLM family) and frontier models
    (Claude Opus 4.6)? Hypothesis: skills should help weaker models more, since
    frontier models already have the knowledge internalized.
  evidence: []
  tags: [research-question, hypothesis]
  session: "2026-04-03-design"
  retrospective: true

# ══════════════════════════════════════════════════════════════
# SESSION: 2026-04-03 — MVP Implementation
# ══════════════════════════════════════════════════════════════

- id: "003b"
  date: "2026-04-03"
  category: method
  title: "Domain selection — USD and Houdini chosen for distance from training data"
  body: >
    Selected two VFX domains: Pixar USD (composition arcs, variant sets, references)
    and Houdini Solaris (LOP scripting via hou.pwd().editableStage()). Both are niche
    Python APIs with limited training data representation, maximizing potential for
    skill uplift. The critical API is GetVariantEditContext() — models frequently
    hallucinate alternatives like LockVariant(), .edit(), or GetPrototypeStage().
  evidence:
    - "tasks/tier3/usd-shot-assembly/task.yaml"
    - "tasks/tier3/houdini-solaris/task.yaml"
  tags: [design, domain-selection, usd, houdini]
  session: "2026-04-03-design"
  retrospective: true

- id: "003c"
  date: "2026-04-03"
  category: method
  title: "Validation approach — execution-based scoring with structural test suites"
  body: >
    Each task has a validate.py that executes generated code and inspects output.
    USD validator loads .usda files with pxr library, runs 10 structural tests
    (prim hierarchy, variant sets, mesh types, references, transforms). Houdini
    tasks use a mock hou module providing a real Usd.Stage without Houdini license.
    Score = tests_passed / total_tests, giving granular 0.0-1.0 partial credit.
  evidence:
    - "tasks/tier3/usd-shot-assembly/validate.py"
    - "tasks/tier3/houdini-solaris/validate.py"
  tags: [design, validation, scoring]
  session: "2026-04-03-design"
  retrospective: true

- id: "003d"
  date: "2026-04-05"
  category: method
  title: "Skill design spectrum — broad reference to narrow task-hints to DSPy-compiled"
  body: >
    Skills deliberately designed along a granularity spectrum. USD reference (144
    lines) includes 7 sections covering patterns beyond what the task needs —
    tests the 'give them the docs' approach. Task-hints (40 lines) contains only
    4 task-relevant API patterns — tests minimum viable information. DSPy-compiled
    variants are auto-optimized for specific target models. The recursive-descent-
    parser (102 lines) and lru-cache-pattern (70 lines) skills are near-complete
    solutions testing whether reference implementations help.
  evidence:
    - "skills/usd-composition/reference.md"
    - "skills/usd-composition/task-hints.md"
    - "skills/recursive-descent-parser/SKILL.md"
    - "skills/lru-cache-pattern/SKILL.md"
  tags: [design, skill-granularity, methodology]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "004"
  date: "2026-04-03"
  category: context
  title: "MVP framework implemented — Python package with 3 CLI adapters"
  body: >
    Built llm-bench Python package with src layout. 3 CLI adapters (Claude Code,
    Open Code, Kilo), task loader, workspace manager, automated scorer, LLM judge
    stub, result storage, and FastAPI dashboard with 4 views. 2 tier 1 tasks
    (hello-world, fizzbuzz). 44 tests passing.
  evidence:
    - "src/llm_bench/"
    - "tasks/tier1/"
  tags: [implementation, mvp]
  session: "2026-04-03-mvp"
  retrospective: true

- id: "005"
  date: "2026-04-03"
  category: result
  title: "Early dev runs — qwen3-30b, qwen3-coder-next, gemma-4-31b"
  body: >
    32 early development runs testing the framework. Mix of models and CLIs
    on tier 1 tasks. 7/32 passed — many failures were framework bugs
    (adapter issues, env config) not model failures.
  evidence:
    - "results/tier1-*_2026-04-03*.json"
  tags: [tier1, early-testing]
  session: "2026-04-03-mvp"
  retrospective: true

# ══════════════════════════════════════════════════════════════
# SESSION: 2026-04-04 — First Real Benchmarks
# ══════════════════════════════════════════════════════════════

- id: "006"
  date: "2026-04-04"
  category: method
  title: "Selected 5 free/cheap OpenRouter models for initial benchmark"
  body: >
    Researched OpenRouter free models. Many have limitations (no tool calling,
    provider restrictions, max_tokens caps). Selected: qwen3-coder-free,
    glm-4.5-air-free, glm-4.7-flash, qwen3-next-80b-free, glm-5.
    Claude Code proxy supports limited providers (Qwen, Z-AI, Llama).
  evidence:
    - "config/models.yaml"
  tags: [model-selection, openrouter]
  session: "2026-04-04-first-benchmarks"
  retrospective: true

- id: "007"
  date: "2026-04-04"
  category: finding
  title: "2 of 5 free models are non-functional (all timeout)"
  body: >
    qwen3-coder-free and qwen3-next-80b-free timed out on every single task
    across both CLIs. Zero usable output. Only the 3 GLM models
    (glm-4.5-air-free, glm-4.7-flash, glm-5) produced real data.
  evidence:
    - "results/tier1-*qwen3-coder-free*.json"
    - "results/tier1-*qwen3-next-80b-free*.json"
  tags: [model-viability, timeout, openrouter]
  session: "2026-04-04-first-benchmarks"
  retrospective: true

# ══════════════════════════════════════════════════════════════
# SESSION: 2026-04-05 — Task Expansion + V1 Benchmark
# ══════════════════════════════════════════════════════════════

- id: "008"
  date: "2026-04-05"
  category: method
  title: "Expanded to 16 tasks across all 4 tiers"
  body: >
    Implemented 14 new tasks. Tier 2 (6): csv-pipeline, cli-tool, log-processor,
    makefile, usd-scene, houdini-sop. Tier 3 (6): lru-cache, expression-parser,
    git-hook, service-generator, usd-shot-assembly, houdini-solaris.
    Tier 4 (2): usd-shot-assembly + usd-composition skill, houdini-solaris +
    houdini-solaris skill. Created mock hou module for Houdini tasks.
  evidence:
    - "tasks/"
    - "skills/usd-composition/reference.md"
    - "skills/houdini-solaris/SKILL.md"
  tags: [tasks, skills, tier-expansion]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "009"
  date: "2026-04-05"
  category: result
  title: "V1 Benchmark — 160 runs, 6.3 hours, 3 functional models"
  body: >
    Full benchmark: 5 models x 2 CLIs x 16 tasks = 160 runs. 2 models
    non-functional (all timeout). 3 GLM models produced data.
    Best model: glm-5 on Claude Code (12/16 pass, avg=0.76).
    Hardest tasks: expression-parser, lru-cache, houdini-solaris (0/18 all models).
  evidence:
    - "results/*_2026-04-04*.json"
    - "results/*_2026-04-05*.json"
  tags: [v1-benchmark, full-run]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "010"
  date: "2026-04-05"
  category: finding
  title: "Tier difficulty perfectly calibrated — 92%, 78%, 42%, 25%"
  body: >
    Pass rates by tier: T1=92%, T2=78%, T3=42%, T4=25%. The progressive
    difficulty validates the tier system design. The drop from T3 to T4
    is partly artificial since T4 has fewer tasks, but the domain-specific
    tasks (T3/T4) are genuinely harder.
  evidence:
    - "results/"
  tags: [tier-calibration, validation]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "011"
  date: "2026-04-05"
  category: surprise
  title: "Broad USD skill DESTROYS glm-4.5 performance (0.8 → 0.2)"
  body: >
    glm-4.5-air-free scored 0.8 on tier3-usd-shot-assembly (no skill) but
    dropped to 0.2 on tier4 (with usd-composition reference skill — 144 lines
    of broad API reference). The skill actively harmed the model.
    This directly contradicts our initial hypothesis that skills help weaker models.
  evidence:
    - "results/tier3-usd-shot-assembly_claude-code_glm-4.5-air-free*.json"
    - "results/tier4-usd-shot-assembly_claude-code_glm-4.5-air-free*.json"
  tags: [skill-uplift, glm-4.5, negative-uplift, key-finding]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "012"
  date: "2026-04-05"
  category: finding
  title: "Root cause — API hallucination amplification from skill content"
  body: >
    When given the broad USD skill, weaker models treat the examples as
    authoritative and hallucinate similar-sounding APIs (e.g. GetPrototypeStage,
    .edit() instead of GetVariantEditContext). The skill provides enough context
    to make the model confident in wrong approaches but not enough to prevent
    hallucination. Authority bias + context saturation.
  evidence:
    - "results/tier4-usd-shot-assembly_claude-code_glm-4.5-air-free*.json"
  tags: [hallucination, root-cause, authority-bias]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "013"
  date: "2026-04-05"
  category: hypothesis
  title: "Capability threshold theory — skills only help models 'on the cusp'"
  body: >
    Skills only help models strong enough to synthesize from examples but not
    strong enough to solve the task alone. Too-weak models get confused by
    extra context (hallucination amplification). Too-strong models already
    know the answer. The uplift sweet spot is a narrow capability band.
  evidence:
    - "results/tier4-*glm-5*.json"
    - "results/tier4-*glm-4.5*.json"
  tags: [capability-threshold, theory, key-finding]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

- id: "014"
  date: "2026-04-05"
  category: surprise
  title: "glm-5 + houdini-solaris skill: 0.0 → 1.0 on Claude Code"
  body: >
    The one clear positive skill uplift in V1. glm-5 couldn't do the Houdini
    Solaris task at all (0.0) but with the skill it scored 1.0 on Claude Code.
    This model was exactly at the capability threshold — it needed the skill
    to bridge the gap. Validates the threshold theory from the positive side.
  evidence:
    - "results/tier3-houdini-solaris_claude-code_glm-5*.json"
    - "results/tier4-houdini-solaris_claude-code_glm-5*.json"
  tags: [skill-uplift, positive-uplift, glm-5, houdini, capability-threshold]
  session: "2026-04-05-v1-benchmark"
  retrospective: true

