# SESSION: 2026-04-05 — Skill Variants + DSPy Compiler
# ══════════════════════════════════════════════════════════════

- id: "015"
  date: "2026-04-05"
  category: method
  title: "Skill variant system — domain:variant format with VARIANTS.yaml"
  body: >
    Built variant system to test multiple skill formulations. Format:
    'usd-composition:task-hints' resolves to skills/usd-composition/task-hints.md.
    VARIANTS.yaml declares available variants and the default. Each tier 4 task
    specifies which variant to use. This enables A/B testing of skill content.
  evidence:
    - "src/llm_bench/runner.py:28-55"
    - "skills/usd-composition/VARIANTS.yaml"
  tags: [skill-variants, methodology]
  session: "2026-04-05-skill-variants"
  retrospective: true

- id: "016"
  date: "2026-04-05"
  category: method
  title: "Created task-hints variant — manual narrow skill (40 lines vs 144)"
  body: >
    Hypothesis: the broad 144-line reference skill is too much for weak models.
    Created a 40-line task-hints variant containing only the specific APIs
    needed for the shot assembly task. Tests whether narrower skills reduce harm.
  evidence:
    - "skills/usd-composition/task-hints.md"
  tags: [skill-variants, narrow-skills]
  session: "2026-04-05-skill-variants"
  retrospective: true

- id: "017"
  date: "2026-04-05"
  category: method
  title: "DSPy skill compiler — automated skill optimization via BootstrapFewShot"
  body: >
    Built DSPy integration to automatically optimize skills for target models.
    Teacher model generates candidate skills, proxy metric scores structural
    quality (markdown, code examples, conciseness, API pattern coverage),
    BootstrapFewShot optimizer selects the best. Also supports live metric
    mode that runs actual benchmarks in the optimization loop.
  evidence:
    - "src/llm_bench/compiler.py"
    - "src/llm_bench/cli.py:290-346"
  tags: [dspy, compiler, methodology]
  session: "2026-04-05-skill-variants"
  retrospective: true

# ══════════════════════════════════════════════════════════════
# SESSION: 2026-04-06 — Skill Variant Experiment
# ══════════════════════════════════════════════════════════════

- id: "018"
  date: "2026-04-06"
  category: result
  title: "DSPy proxy compilation — glm-5 teacher → glm-4.5 target"
  body: >
    Compiled usd-composition skill targeting glm-4.5-air-free using glm-5 as
    teacher. Proxy metric. Output: compiled-glm45.md (80 lines, proxy score 0.80).
    The compiled skill is more task-focused with concrete code patterns.
  evidence:
    - "skills/usd-composition/compiled-glm45.md"
  tags: [dspy, compilation, glm-4.5]
  session: "2026-04-06-variant-experiment"
  retrospective: true

- id: "019"
  date: "2026-04-06"
  category: result
  title: "Variant experiment — 12 runs, all skill variants net-negative on average"
  body: >
    Tested reference, task-hints, and compiled-glm45 variants across 3 models
    and 2 CLIs. Average uplift: reference -0.20, task-hints -0.13, compiled -0.10.
    Narrower skills reduce harm but none achieve net-positive uplift on average.
  evidence:
    - "results/tier4-usd-shot-assembly*_2026-04-06*.json"
  tags: [skill-variants, uplift-measurement]
  session: "2026-04-06-variant-experiment"
  retrospective: true

- id: "020"
  date: "2026-04-06"
  category: surprise
  title: "Same model+skill gives opposite results on different CLIs"
  body: >
    DSPy-compiled skill got glm-4.5 Kilo from 0.1→0.8 (+0.7 uplift) but
    the same skill on Claude Code showed different behavior. Every variant
    that helps one CLI hurts or is neutral on the other. The CLI environment
    is a confounding variable we didn't anticipate.
  evidence:
    - "results/tier4-usd-shot-assembly-compiled_kilo_glm-4.5-air-free*.json"
    - "results/tier4-usd-shot-assembly-compiled_claude-code_glm-4.5-air-free*.json"
  tags: [cli-confound, surprise, key-finding]
  session: "2026-04-06-variant-experiment"
  retrospective: true

# ══════════════════════════════════════════════════════════════
# SESSION: 2026-04-06 — CLI Confound Investigation
# ══════════════════════════════════════════════════════════════

- id: "021"
  date: "2026-04-06"
  category: finding
  title: "CLI confound root causes — LSP, proxy telemetry, hook bloat"
  body: >
    Investigated why same model+skill gives opposite results on CC vs Kilo.
    Three root causes: (1) Kilo LSP false positives — Pyright flags all pxr
    API calls, forcing iteration that can help or hurt. (2) CC proxy swallows
    telemetry — OpenRouter models show empty raw_output/tokens. (3) CC hooks
    bloat context — superpowers SessionStart injects thousands of words,
    consuming the model's context budget for the actual task.
  evidence:
    - ".claude/CURRENT-STATE.md"
  tags: [cli-confound, root-cause, kilo-lsp, cc-hooks]
  session: "2026-04-06-cli-confound"
  retrospective: true

- id: "022"
  date: "2026-04-06"
  category: finding
  title: "Benchmark partially measures CLI tooling, not just model capability"
  body: >
    The CLI confound means our benchmark doesn't purely measure model+skill
    performance. It measures the combined system of model + skill + CLI
    environment. This is actually more realistic (production conditions vary)
    but complicates the skill uplift isolation we designed for.
  evidence: []
  tags: [cli-confound, methodology-limitation, validity]
  session: "2026-04-06-cli-confound"
  retrospective: true

