- id: "027"
  date: "2026-04-06"
  category: result
  title: "DSPy proxy compilation targeting qwen3-30b — usd-composition and houdini-solaris"
  body: >
    Compiled two skill variants targeting qwen3-30b using glm-5 as teacher.
    usd-composition: 76 lines, proxy score 1.00 (149s).
