# SESSION: 2026-04-06 — DSPy Live Compilation + More Variants
# ══════════════════════════════════════════════════════════════

- id: "023"
  date: "2026-04-06"
  category: result
  title: "DSPy live-metric compilation — 34 min, glm-5 teacher → glm-4.5 target on Kilo"
  body: >
    Live-metric compilation uses actual benchmark runs in the optimization loop.
    34 minutes, 6 iterations. Output: compiled-live-glm45.md (59 lines, proxy
    score 1.00). The live metric ensures the skill actually helps the target
    model pass the task, not just looks structurally good.
  evidence:
    - "skills/usd-composition/compiled-live-glm45.md"
  tags: [dspy, live-metric, compilation]
  session: "2026-04-06-live-compilation"
  retrospective: true

- id: "024"
  date: "2026-04-06"
  category: result
  title: "18 variant runs — 5 variants x 3 models x 2 CLIs (partial)"
  body: >
    Benchmarked all 5 USD skill variants (reference, task-hints, compiled-glm45,
    compiled-live-glm45, no-skill baseline). DSPy-live variant recovered
    glm-4.5 on CC to 0.8 (from 0.2 with reference skill). But no single
    variant works across all CLIs.
  evidence:
    - "results/tier4-usd-shot-assembly*_2026-04-06*.json"
  tags: [variant-benchmark, uplift-measurement]
  session: "2026-04-06-live-compilation"
  retrospective: true

- id: "025"
  date: "2026-04-06"
  category: finding
  title: "No single skill variant works across CLIs"
  body: >
    Every variant that helps one CLI hurts or is neutral on the other.
    The CLI environment is the dominant variable, not the skill content.
    This suggests skill optimization may need to be CLI-specific, not
    just model-specific.
  evidence:
    - "results/tier4-usd-shot-assembly*_2026-04-06*.json"
  tags: [cli-confound, skill-variants, key-finding]
  session: "2026-04-06-live-compilation"
  retrospective: true

