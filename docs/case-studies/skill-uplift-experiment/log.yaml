    - "results/tier4-houdini-solaris-compiled-qwen3_claude-code_qwen3-30b*.json"
    - "results/tier4-houdini-solaris-compiled-qwen3_kilo_qwen3-30b*.json"
  tags: [qwen3-30b, dspy, compiled-variants, failure]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "029"
  date: "2026-04-06"
  category: surprise
  title: "qwen3-30b scores 1.0 without skill but 0.0 with its own DSPy-compiled skill"
  body: >
    qwen3-30b scored 1.0 on tier3-usd-shot-assembly (no skill) on CC.
    With its own DSPy-compiled skill (proxy score 1.00), it scored 0.0.
    The skill actively destroyed performance. Every single skill variant
    tested hurt this model on this task: reference 0.7, hints 0.9,
    compiled-glm45 0.9, compiled-live-glm45 0.1, compiled-qwen3 0.0.
    The model-specific compilation was the WORST performer.
  evidence:
    - "results/tier3-usd-shot-assembly_claude-code_qwen3-30b*.json"
    - "results/tier4-usd-shot-assembly-compiled-qwen3_claude-code_qwen3-30b*.json"
  tags: [qwen3-30b, skill-harm, capability-threshold, key-finding]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "030"
  date: "2026-04-06"
  category: finding
  title: "Root cause — model hallucinated LockVariant() despite skill showing GetVariantEditContext()"
  body: >
    The compiled-qwen3 skill correctly demonstrates GetVariantEditContext().
    The model generated code using LockVariant() — a non-existent API.
    The model did not follow the skill's demonstrated pattern, instead
    hallucinating a plausible-sounding alternative. The skill content was
    correct but the model's own priors overrode it.
  evidence:
    - "skills/usd-composition/compiled-qwen3-30b.md"
    - "results/tier4-usd-shot-assembly-compiled-qwen3_claude-code_qwen3-30b*.json"
  tags: [hallucination, root-cause, api-hallucination]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "031"
  date: "2026-04-06"
  category: finding
  title: "Skill detail paradox — more detailed skills cause more harm"
  body: >
    The glm45-compiled skill (vague, with '# configure mesh...' placeholders)
    scored 0.9 with qwen3-30b. The qwen3-compiled skill (detailed, full
    working code) scored 0.0. The vague skill let the model skip complex
    variant authoring and pass. The detailed skill encouraged the model to
    attempt complex operations it then hallucinated. More correct skill
    content = worse outcome for models above the capability threshold.
  evidence:
    - "skills/usd-composition/compiled-glm45.md"
    - "skills/usd-composition/compiled-qwen3-30b.md"
  tags: [skill-detail-paradox, key-finding, capability-threshold]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "032"
  date: "2026-04-06"
  category: finding
  title: "Cross-model transfer outperforms model-specific optimization"
  body: >
    The glm45-compiled variant (compiled for a different model) scored 0.9
    with qwen3-30b. The qwen3-compiled variant (compiled specifically for
    this model) scored 0.0. Cross-model transfer beat model-specific
    optimization, possibly because the cross-model skill was vaguer and
    less prescriptive, giving the model room to use its own approach.
  evidence:
    - "results/tier4-usd-shot-assembly-compiled_claude-code_qwen3-30b*.json"
    - "results/tier4-usd-shot-assembly-compiled-qwen3_claude-code_qwen3-30b*.json"
  tags: [cross-model-transfer, dspy, key-finding]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "033"
  date: "2026-04-06"
  category: finding
  title: "DSPy proxy metric is not predictive of real performance"
  body: >
    The compiled-qwen3 skill scored proxy=1.00 (highest possible) but
    real performance was 0.0 (lowest possible). The proxy metric optimizes
    for structural quality (markdown, code examples, conciseness, API pattern
    coverage) but cannot predict whether a model will actually follow the
    skill's patterns. Behavioral compliance is orthogonal to structural quality.
  evidence:
    - "src/llm_bench/compiler.py:260-298"
  tags: [dspy, proxy-metric, validity, key-finding]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "034"
  date: "2026-04-06"
  category: hypothesis
  title: "Skill harm zones — below, at, and above capability threshold"
  body: >
    Refined capability threshold theory into three zones:
    (1) BELOW threshold — model can't do task at all, skill adds noise,
    hallucination from examples → NET HARM.
    (2) AT threshold — model sometimes passes, narrow task-specific skills
    can tip the balance → POTENTIAL UPLIFT (the sweet spot).
    (3) ABOVE threshold — model reliably passes, skill competes with
    model's correct priors → NET HARM.
    The uplift sweet spot is narrow and model+task specific.
  evidence:
    - "results/"
  tags: [capability-threshold, skill-harm-zones, theory, key-finding]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "035"
  date: "2026-04-06"
  category: finding
  title: "Kilo is 0.0 on all USD/Houdini tasks for qwen3-30b"
  body: >
    qwen3-30b scored 0.0 on every single USD and Houdini task on Kilo,
    regardless of skill variant. 11 runs, all failed. The CLI environment
    (Pyright LSP, provider routing) completely blocks this model on
    domain-specific tasks. The same model scores 1.0 on CC for some of
    these tasks.
  evidence:
    - "results/tier*_kilo_qwen3-30b*_2026-04-06*.json"
  tags: [kilo, qwen3-30b, cli-confound]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "036"
  date: "2026-04-06"
  category: finding
  title: "Houdini Solaris above qwen3-30b difficulty ceiling — 0/6 regardless"
  body: >
    qwen3-30b scored 0.0 on all Houdini Solaris variants (tier3 no-skill,
    tier4 reference skill, tier4 compiled-qwen3 skill) across both CLIs.
    6 runs, all failed. This task is simply above qwen3-30b's capability
    ceiling — no amount of skill optimization can bridge the gap.
  evidence:
    - "results/tier3-houdini-solaris_*_qwen3-30b*.json"
    - "results/tier4-houdini-solaris*_*_qwen3-30b*.json"
  tags: [houdini-solaris, qwen3-30b, difficulty-ceiling]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

- id: "037"
  date: "2026-04-06"
  category: finding
  title: "Run-to-run variance is high — task-hints scored both 0.0 and 0.9 on CC"
  body: >
    The task-hints variant with qwen3-30b on CC produced scores of 0.0
    and 0.9 across two separate runs. This high variance means single-run
    conclusions are unreliable. Statistical significance requires multiple
    runs per configuration, which we haven't done systematically.
  evidence:
    - "results/archive-v1/tier4-usd-shot-assembly-hints_claude-code_qwen3-30b*.json"
  tags: [variance, statistical-validity, methodology-limitation]
  session: "2026-04-06-qwen3-experiment"
  retrospective: true

