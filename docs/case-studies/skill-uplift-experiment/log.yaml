- id: "041"
  date: "2026-04-07"
  category: finding
  title: "Skills help on CC (+0.147 mean uplift) but hurt on Kilo (-0.068)"
  body: >
    266 paired tier3-vs-tier4 comparisons. On Claude Code: 40 positive, 84
    neutral, 9 negative (mean +0.147). On Kilo: 9 positive, 95 neutral, 29
    negative (mean -0.068). Overall: 18% positive, 67% neutral, 14% negative
    (mean +0.039). The CLI environment is THE dominant variable for skill
    effectiveness — not the skill content or the model.
  evidence:
    - "results/"
  tags: [skill-uplift, cli-confound, key-finding, phase-2]
  session: "2026-04-07-phase2-analysis"
  retrospective: false

- id: "042"
  date: "2026-04-07"
  category: finding
  title: "Houdini Solaris skill: +1.0 uplift for 3 models on CC, 0 on Kilo"
  body: >
    The houdini-solaris reference skill produced the most consistent positive
    uplift in the study. Three models went 0.0→1.0 on CC: glm-5, qwen3-30b,
    and qwen3-coder-next. All three are 'at threshold' models — they can't
    do the task alone but can synthesize from the skill. On Kilo: 0/6 models
    showed any uplift. Zero. The same skill, same models, opposite CLI.
  evidence:
    - "results/tier3-houdini-solaris_claude-code_*.json"
    - "results/tier4-houdini-solaris_claude-code_*.json"
  tags: [houdini-solaris, skill-uplift, positive-uplift, cli-confound, key-finding]
  session: "2026-04-07-phase2-analysis"
  retrospective: false

- id: "043"
  date: "2026-04-07"
  category: surprise
  title: "Expression parser skill: extreme ±1.0 swings — helps and destroys"
  body: >
    The recursive-descent-parser skill (102 lines, near-complete solution)
    shows the most extreme polarization. On CC: glm-5 0.0→1.0 (+1.0),
    glm-4.5 0.1→1.0 (+0.9), but glm-4.7 1.0→0.0 (-1.0). On Kilo: glm-5
    1.0→0.0 (-1.0), the exact opposite of CC. The same skill, same model,
    opposite outcome depending on CLI. This near-complete-solution skill
    helps models that need it but destroys models that already know the answer.
  evidence:
    - "results/tier3-expression-parser_*.json"
    - "results/tier4-expression-parser_*.json"
  tags: [expression-parser, skill-uplift, extreme-variance, cli-confound]
  session: "2026-04-07-phase2-analysis"
  retrospective: false

- id: "044"
  date: "2026-04-07"
  category: surprise
  title: "qwen3-30b scored 0.0 on USD this run vs 1.0 in Phase 1 — variance confirmed"
  body: >
    qwen3-30b scored 0.0 on tier3-usd-shot-assembly on CC in Phase 2, but
